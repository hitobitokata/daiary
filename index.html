<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日記</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .app { max-width: 480px; margin: 0 auto; padding: 1.25rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .topbar h1 { font-size: 22px; font-weight: 600; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .back-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #666; padding: 2px 4px; }
    .back-btn:hover { color: #1a1a1a; }
    #count-label { font-size: 13px; color: #888; }
    .search-wrap { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 0 12px; margin-bottom: 1rem; }
    .search-wrap input { border: none; background: transparent; padding: 10px 0; font-size: 14px; outline: none; flex: 1; color: #1a1a1a; }
    .search-wrap input::placeholder { color: #bbb; }
    .tag-scroll { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tag-pill { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #666; transition: all 0.15s; }
    .tag-pill.active { background: #EEEDFE; border-color: #AFA9EC; color: #3C3489; }
    .memo-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.25rem; }
    .memo-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 14px 16px; transition: border-color 0.15s; }
    .memo-card:hover { border-color: #ccc; }
    .memo-card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .memo-card-main { flex: 1; cursor: pointer; }
    .memo-date { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .memo-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 3px; }
    .memo-preview { font-size: 13px; color: #999; }
    .memo-tags-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .mtag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #EEEDFE; color: #3C3489; font-weight: 500; }
    .mtag.teal { background: #E1F5EE; color: #085041; }
    .mtag.coral { background: #FAECE7; color: #712B13; }
    .mtag.amber { background: #FAEEDA; color: #633806; }
    .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; font-size: 14px; color: #aaa; transition: all 0.15s; }
    .icon-btn:hover { background: #f0f0f0; color: #555; }
    .icon-btn.del:hover { background: #FCEBEB; color: #A32D2D; }
    .new-btn { width: 100%; padding: 13px; border-radius: 12px; border: 1.5px dashed #ccc; background: transparent; color: #888; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
    .new-btn:hover { background: #f0f0f0; }
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: #bbb; font-size: 14px; }

    /* 詳細画面 */
    .detail-wrap { display: none; flex-direction: column; gap: 0; }
    .detail-wrap.show { display: flex; flex-direction: column; }
    .detail-date { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .detail-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 14px; line-height: 1.3; }
    .detail-image { width: 100%; max-height: 240px; object-fit: cover; border-radius: 10px; margin-bottom: 16px; }
    .detail-body { font-size: 15px; color: #333; line-height: 1.8; white-space: pre-wrap; margin-bottom: 16px; }
    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .detail-divider { border: none; border-top: 1px solid #eee; margin: 16px 0; }

    /* エディタ */
    .editor-wrap { display: none; flex-direction: column; gap: 12px; }
    .editor-wrap.show { display: flex; }
    .editor-wrap input.title-in { font-size: 18px; font-weight: 600; border: none; border-bottom: 1.5px solid #e0e0e0; padding: 8px 0; background: transparent; color: #1a1a1a; outline: none; width: 100%; }
    .editor-wrap textarea { border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; font-size: 14px; line-height: 1.7; color: #1a1a1a; background: #fff; outline: none; resize: none; min-height: 200px; width: 100%; font-family: inherit; }
    .tag-input-wrap { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; border: 1px solid #e0e0e0; border-radius: 10px; padding: 8px 12px; background: #fff; min-height: 42px; }
    .tag-input-wrap input { border: none; outline: none; font-size: 13px; background: transparent; color: #1a1a1a; flex: 1; min-width: 80px; font-family: inherit; }
    .tag-input-wrap input::placeholder { color: #bbb; }
    .tag-hint { font-size: 12px; color: #aaa; }
    .img-upload-area { border: 1.5px dashed #ddd; border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; color: #aaa; font-size: 13px; transition: background 0.15s; }
    .img-upload-area:hover { background: #f9f9f9; }
    .img-preview-wrap { position: relative; }
    .img-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; display: block; }
    .img-remove-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .editor-actions { display: flex; gap: 8px; }
    .btn-save { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #AFA9EC; background: #EEEDFE; color: #3C3489; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #dddcfd; }
    .btn-cancel { padding: 12px 18px; border-radius: 10px; border: 1px solid #ddd; background: transparent; color: #666; font-size: 14px; cursor: pointer; }
    .btn-cancel:hover { background: #f5f5f5; }

    /* 削除確認 */
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); align-items: center; justify-content: center; z-index: 100; }
    .confirm-overlay.show { display: flex; }
    .confirm-box { background: #fff; border-radius: 14px; padding: 24px; width: 280px; text-align: center; }
    .confirm-box p { font-size: 15px; color: #1a1a1a; margin-bottom: 18px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 8px; }
    .btn-confirm-del { flex: 1; padding: 11px; border-radius: 10px; border: none; background: #E24B4A; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-confirm-cancel { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid #ddd; background: transparent; color: #666; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="app">

    <!-- 一覧画面 -->
    <div id="list-section">
      <div class="topbar">
        <h1>日記</h1>
        <span id="count-label">0件</span>
      </div>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-in" placeholder="日記を検索..." oninput="filterMemos()">
      </div>
      <div class="tag-scroll" id="tag-filters">
        <div class="tag-pill active" data-tag="all" onclick="selectTag('all')">すべて</div>
      </div>
      <div class="memo-list" id="memo-list"></div>
      <button class="new-btn" onclick="openEditor(null)">＋ 新しい日記</button>
    </div>

    <!-- 詳細画面 -->
    <div class="detail-wrap" id="detail-section">
      <div class="topbar">
        <div class="topbar-left">
          <button class="back-btn" onclick="closeDetail()" aria-label="戻る">←</button>
          <h1>日記</h1>
        </div>
        <div class="card-actions">
          <button class="icon-btn" id="detail-edit-btn" title="編集">✏️</button>
          <button class="icon-btn del" id="detail-delete-btn" title="削除">🗑️</button>
        </div>
      </div>
      <div class="detail-date" id="detail-date"></div>
      <div class="detail-title" id="detail-title"></div>
      <img class="detail-image" id="detail-image" src="" alt="添付画像" style="display:none">
      <hr class="detail-divider">
      <div class="detail-body" id="detail-body"></div>
      <div class="detail-tags" id="detail-tags"></div>
    </div>

    <!-- エディタ画面 -->
    <div class="editor-wrap" id="editor">
      <div class="topbar">
        <div class="topbar-left">
          <button class="back-btn" onclick="closeEditor()" aria-label="戻る">←</button>
          <h1 id="editor-title">新しい日記</h1>
        </div>
      </div>
      <input class="title-in" id="ed-title" type="text" placeholder="タイトル">
      <textarea id="ed-body" placeholder="今日の日記を書こう..."></textarea>
      <div class="tag-input-wrap" id="tag-input-wrap"></div>
      <div class="tag-hint">タグをカンマ区切りで入力（例：読書, アイデア）</div>
      <div id="img-section"></div>
      <div class="editor-actions">
        <button class="btn-cancel" onclick="closeEditor()">キャンセル</button>
        <button class="btn-save" onclick="saveMemo()">保存する</button>
      </div>
    </div>
  </div>

  <!-- 削除確認 -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p>この日記を削除しますか？<br>元に戻せません。</p>
      <div class="confirm-actions">
        <button class="btn-confirm-cancel" onclick="closeConfirm()">キャンセル</button>
        <button class="btn-confirm-del" onclick="confirmDelete()">削除する</button>
      </div>
    </div>
  </div>

  <script>
    const tagColors = { '読書': '', '勉強': 'teal', 'アイデア': 'amber', '日記': 'coral' };
    function tagColor(t) { return tagColors[t] || ''; }

    let memos = JSON.parse(localStorage.getItem('memos') || '[]');
    let nextId = parseInt(localStorage.getItem('nextId') || '1');
    let activeTag = 'all';
    let editingTags = [];
    let editingId = null;
    let editingImage = null;
    let deleteTargetId = null;
    let viewingId = null;

    function save() {
// === クラウド同期のための土台 ===
// 現在は localStorage を使用しています。
// 将来的に Google Apps Script API を使う場合は
// save() と初期読み込み部分を fetch() に置き換えるだけで済むようにしています。
async function syncFromCloud(){
  // TODO: fetch('YOUR_GAS_URL?action=list')
  console.log('Cloud sync placeholder');
}
async function syncToCloud(){
  // TODO: fetch('YOUR_GAS_URL',{method:'POST',body:JSON.stringify(memos)});
  console.log('Cloud save placeholder');
}

      localStorage.setItem('memos', JSON.stringify(memos));
      localStorage.setItem('nextId', String(nextId));
      syncToCloud();
    }

    function showSection(name) {
      document.getElementById('list-section').style.display = name === 'list' ? '' : 'none';
      document.getElementById('detail-section').classList.toggle('show', name === 'detail');
      document.getElementById('editor').classList.toggle('show', name === 'editor');
    }

    function allTags() {
      const tags = new Set();
      memos.forEach(m => m.tags.forEach(t => tags.add(t)));
      return Array.from(tags);
    }

    function renderTagFilters() {
      const wrap = document.getElementById('tag-filters');
      const existing = Array.from(wrap.querySelectorAll('.tag-pill')).map(p => p.dataset.tag);
      allTags().forEach(t => {
        if (!existing.includes(t)) {
          const pill = document.createElement('div');
          pill.className = 'tag-pill';
          pill.dataset.tag = t;
          pill.textContent = t;
          pill.onclick = () => selectTag(t);
          wrap.appendChild(pill);
        }
      });
      wrap.querySelectorAll('.tag-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.tag === activeTag);
      });
    }

    function renderMemos() {
      const list = document.getElementById('memo-list');
      const q = document.getElementById('search-in').value.trim().toLowerCase();
      const filtered = memos.filter(m => {
        const tagMatch = activeTag === 'all' || m.tags.includes(activeTag);
        const textMatch = !q || (m.title + m.body + m.tags.join(' ')).toLowerCase().includes(q);
        return tagMatch && textMatch;
      });
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">日記がありません。<br>「新しい日記」から追加しよう！</div>';
      } else {
        list.innerHTML = filtered.map(m => {
          const preview = m.body.replace(/\n/g, ' ').slice(0, 10) + (m.body.length > 10 ? '...' : '');
          return `
          <div class="memo-card">
            <div class="memo-card-header">
              <div class="memo-card-main" onclick="openDetail(${m.id})">
                <div class="memo-date">${m.date}</div>
                <div class="memo-title">${m.title}</div>
                <div class="memo-preview">${preview}</div>
                ${m.tags.length ? `<div class="memo-tags-row">${m.tags.map(t => `<span class="mtag ${tagColor(t)}">${t}</span>`).join('')}</div>` : ''}
              </div>
              <div class="card-actions">
                <button class="icon-btn" onclick="openEditor(${m.id})" title="編集">✏️</button>
                <button class="icon-btn del" onclick="askDelete(${m.id})" title="削除">🗑️</button>
              </div>
            </div>
          </div>`;
        }).join('');
      }
      document.getElementById('count-label').textContent = memos.length + '件';
      renderTagFilters();
    }

    function filterMemos() { syncFromCloud();
    renderMemos(); }
    function selectTag(tag) { activeTag = tag; renderMemos(); }

    function openDetail(id) {
      const m = memos.find(m => m.id === id);
      if (!m) return;
      viewingId = id;
      document.getElementById('detail-date').textContent = m.date;
      document.getElementById('detail-title').textContent = m.title;
      document.getElementById('detail-body').textContent = m.body;
      const img = document.getElementById('detail-image');
      if (m.image) { img.src = m.image; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
      document.getElementById('detail-tags').innerHTML = m.tags.map(t => `<span class="mtag ${tagColor(t)}">${t}</span>`).join('');
      document.getElementById('detail-edit-btn').onclick = () => openEditor(id);
      document.getElementById('detail-delete-btn').onclick = () => askDelete(id);
      showSection('detail');
    }

    function closeDetail() { viewingId = null; showSection('list'); }

    function openEditor(id) {
      editingId = id;
      const memo = id !== null ? memos.find(m => m.id === id) : null;
      document.getElementById('editor-title').textContent = memo ? '日記を編集' : '新しい日記';
      document.getElementById('ed-title').value = memo ? memo.title : '';
      document.getElementById('ed-body').value = memo ? memo.body : '';
      editingTags = memo ? [...memo.tags] : [];
      editingImage = memo ? (memo.image || null) : null;
      renderTagInput();
      renderImageSection();
      showSection('editor');
    }

    function closeEditor() {
      editingId = null;
      editingImage = null;
      showSection('list');
    }

    function renderTagInput() {
      const wrap = document.getElementById('tag-input-wrap');
      wrap.innerHTML = editingTags.map((t, i) =>
        `<span class="mtag ${tagColor(t)}" style="cursor:pointer" onclick="removeTag(${i})">${t} ×</span>`
      ).join('') + `<input type="text" id="tag-in" placeholder="${editingTags.length ? 'タグを追加...' : '読書, 勉強...'}" onkeydown="handleTagKey(event)">`;
    }

    function handleTagKey(e) {
      if (e.key === ',' || e.key === 'Enter') {
        e.preventDefault();
        const v = e.target.value.replace(',', '').trim();
        if (v && !editingTags.includes(v)) editingTags.push(v);
        renderTagInput();
        setTimeout(() => { const i = document.getElementById('tag-in'); if (i) i.focus(); }, 10);
      }
    }

    function removeTag(i) { editingTags.splice(i, 1); renderTagInput(); }

    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const sec = document.getElementById('img-section');
      sec.innerHTML = '<div class="img-upload-area" style="color:#aaa">画像を読み込み中...</div>';
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 800;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          editingImage = canvas.toDataURL('image/jpeg', 0.7);
          renderImageSection();
        };
        img.onerror = () => {
          editingImage = null;
          renderImageSection();
          alert('画像の読み込みに失敗しました。');
        };
        img.src = ev.target.result;
      };
      reader.onerror = () => {
        editingImage = null;
        renderImageSection();
        alert('画像の読み込みに失敗しました。もう一度試してください。');
      };
      reader.readAsDataURL(file);
    }

    function renderImageSection() {
      const sec = document.getElementById('img-section');
      if (editingImage) {
        sec.innerHTML = `<div class="img-preview-wrap"><img class="img-preview" src="${editingImage}" alt="プレビュー"><button class="img-remove-btn" onclick="removeImage()">✕</button></div>`;
      } else {
        sec.innerHTML = `<div class="img-upload-area" onclick="document.getElementById('img-file').click()">📷 画像を追加する</div><input type="file" id="img-file" accept="image/*" style="display:none" onchange="handleImageUpload(event)">`;
      }
    }

    function removeImage() { editingImage = null; renderImageSection(); }

    function saveMemo() {
      const title = document.getElementById('ed-title').value.trim();
      const body = document.getElementById('ed-body').value.trim();
      if (!title && !body) {
        alert('タイトルか本文を入力してください。');
        return;
      }
      const sec = document.getElementById('img-section');
      if (sec && sec.textContent.includes('読み込み中')) {
        alert('画像を読み込み中です。少し待ってから保存してください。');
        return;
      }
      const tagInVal = document.getElementById('tag-in') ? document.getElementById('tag-in').value.trim() : '';
      if (tagInVal && !editingTags.includes(tagInVal)) editingTags.push(tagInVal);
      const d = new Date();
      const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      if (editingId !== null) {
        const idx = memos.findIndex(m => m.id === editingId);
        if (idx !== -1) memos[idx] = { ...memos[idx], title: title || '（タイトルなし）', body, tags: editingTags, image: editingImage };
      } else {
        memos.unshift({ id: nextId++, date: dateStr, title: title || '（タイトルなし）', body, tags: editingTags, image: editingImage });
      }
      save();
      closeEditor();
      renderMemos();
    }

    function askDelete(id) {
      deleteTargetId = id;
      document.getElementById('confirm-overlay').classList.add('show');
    }

    function closeConfirm() {
      deleteTargetId = null;
      document.getElementById('confirm-overlay').classList.remove('show');
    }

    function confirmDelete() {
      memos = memos.filter(m => m.id !== deleteTargetId);
      save();
      closeConfirm();
      if (viewingId === deleteTargetId) closeDetail();
      renderMemos();
    }

    renderMemos();
  </script>
</body>
</html>
